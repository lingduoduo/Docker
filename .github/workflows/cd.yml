name: CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      strategy:
        description: Deployment strategy
        required: true
        default: standard
        type: choice
        options:
          - standard
          - canary
      image_repository:
        description: Container image repository to deploy
        required: false
        default: ghcr.io/example/model-server
        type: string
      image_tag:
        description: Container image tag to deploy
        required: false
        default: latest
        type: string

env:
  IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY || 'ghcr.io/example/model-server' }}
  CHART_PATH: Helm-Chart/mychart
  RELEASE_NAME: model-release
  KUBE_NAMESPACE: model-serving

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Validate kubeconfig secret
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "${KUBE_CONFIG_DATA}" ]; then
            echo "KUBE_CONFIG_DATA secret is not set for this GitHub environment."
            exit 1
          fi

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 --decode > "${HOME}/.kube/config"

      - name: Deploy with Helm
        env:
          DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
          DEPLOY_STRATEGY: ${{ github.event.inputs.strategy || 'standard' }}
          IMAGE_REPOSITORY: ${{ github.event.inputs.image_repository || vars.IMAGE_REPOSITORY || 'ghcr.io/example/model-server' }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
        run: bash deploy/deploy_with_helm.sh
