replicaCount: 3

image:
  repository: ghcr.io/example/model-server
  tag: latest

model:
  name: production-model
  path: /models/model

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80
