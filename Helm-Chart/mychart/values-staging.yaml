replicaCount: 1

image:
  repository: ghcr.io/example/model-server
  tag: latest

model:
  name: staging-model
  path: /models/model

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Enable startup probe for slow-starting models in staging
startupProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 30

ingress:
  enabled: false
