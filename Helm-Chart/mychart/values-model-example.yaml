image:
  repository: ghcr.io/example/model-server
  tag: "1.0.0"

container:
  port: 8000
  command:
    - python
  args:
    - -m
    - uvicorn
    - app.main:app
    - --host
    - 0.0.0.0
    - --port
    - "8000"

model:
  name: sentiment-classifier
  path: /models/sentiment

env:
  - name: LOG_LEVEL
    value: info

service:
  type: ClusterIP
  port: 8000

readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: http

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

persistence:
  enabled: true
  mountPath: /models
  size: 20Gi
