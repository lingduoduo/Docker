replicaCount: 1

image:
  repository: your-docker-registry/model-server
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod annotations for tracking deployments and integrations
podAnnotations:
  prometheus.io/scrape: "false"
  # git.commit, build.number, deployment.timestamp added at deployment time

podLabels: {}

# Security context for pods and containers
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

container:
  port: 8080
  command: []
  args: []
  workingDir: ""

model:
  name: sample-model
  path: /models/model

env: []
# Example:
# env:
#   - name: LOG_LEVEL
#     value: info

envFrom: []
# Example:
# envFrom:
#   - configMapRef:
#       name: shared-model-config

configMap:
  enabled: false
  data: {}

secretEnv:
  enabled: false
  data: {}

persistence:
  enabled: false
  mountPath: /models
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi

service:
  # ClusterIP is the recommended default.
  # Kubernetes will load-balance across healthy pod replicas behind this Service.
  # Use Ingress for external traffic and advanced routing. Use LoadBalancer only when needed.
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: model.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

startupProbe:
  enabled: false
  httpGet:
    path: /health
    port: http
  failureThreshold: 30
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget for high availability
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

nodeSelector: {}
affinity: {}
tolerations: []
volumeMounts: []
volumes: []

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
